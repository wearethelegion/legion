syntax = "proto3";

package legion.knowledge;

import "legion_common.proto";

// Knowledge Management Service
service KnowledgeService {
  rpc CreateKnowledge(CreateKnowledgeRequest) returns (CreateKnowledgeResponse);
  rpc QueryKnowledge(QueryKnowledgeRequest) returns (QueryKnowledgeResponse);
  rpc FastQuery(FastQueryRequest) returns (QueryKnowledgeResponse);
  rpc SearchByTags(SearchByTagsRequest) returns (QueryKnowledgeResponse);
  rpc ExploreGraph(ExploreGraphRequest) returns (ExploreGraphResponse);
}

// Create Knowledge
message CreateKnowledgeRequest {
  string text = 1;
  string user_token = 2;
  map<string, string> metadata = 3;
  string request_id = 4;  // For idempotency
  string project_id = 5;  // Target project (required)
}

message CreateKnowledgeResponse {
  string status = 1;
  string message = 2;
  string knowledge_id = 3;
  string project_id = 4;
  string company_id = 5;
  string title = 6;
  string summary = 7;
  int32 chunks_count = 8;
  int32 entities_count = 9;
  int32 relationships_count = 10;
  string error_message = 11;
  string error_code = 12;
}

// Query Knowledge
message QueryKnowledgeRequest {
  string query = 1;
  string project_id = 2;
  string user_token = 3;
  int32 limit = 4;
}

message QueryResult {
  string id = 1;
  string text = 2;
  map<string, string> metadata = 3;
  double score = 4;
  double vector_score = 5;
  double rerank_score = 6;
}

message QueryKnowledgeResponse {
  string status = 1;
  string query = 2;
  string project_id = 3;
  int32 results_count = 4;
  repeated QueryResult results = 5;
  string error_message = 6;
  string error_code = 7;
}

// Fast Query (same as QueryKnowledge)
message FastQueryRequest {
  string query = 1;
  string project_id = 2;
  string user_token = 3;
  int32 limit = 4;
}

// Search by Tags
message SearchByTagsRequest {
  string project_id = 1;
  string user_token = 2;
  repeated string keywords = 3;
  string chunk_type = 4;
  bool has_code = 5;
  string section_title = 6;
  int32 section_level = 7;
  int32 limit = 8;
  int32 offset = 9;             // Pagination offset
}

// Explore Graph
message ExploreGraphRequest {
  string cypher = 1;
  string project_id = 2;
  string user_token = 3;
  map<string, string> params = 4;
  int32 limit = 5;
}

// Explore Graph Response - preserves arbitrary Cypher query results
message GraphQueryResult {
  map<string, string> fields = 1;  // Arbitrary key-value pairs from Cypher RETURN
}

message ExploreGraphResponse {
  string status = 1;
  string query = 2;
  string project_id = 3;
  int32 results_count = 4;
  repeated GraphQueryResult results = 5;
  string error_message = 6;
  string error_code = 7;
}
