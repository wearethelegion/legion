id = "legion"
name = "Legion"
description = "The open source coding agent."
version = "1.2.6"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/wearethelegion/legion"

[agent_servers.legion]
name = "Legion"
icon = "./icons/legion.svg"

[agent_servers.legion.targets.darwin-aarch64]
archive = "https://github.com/wearethelegion/legion/releases/download/v1.2.6/legion-darwin-arm64.zip"
cmd = "./legion"
args = ["acp"]

[agent_servers.legion.targets.darwin-x86_64]
archive = "https://github.com/wearethelegion/legion/releases/download/v1.2.6/legion-darwin-x64.zip"
cmd = "./legion"
args = ["acp"]

[agent_servers.legion.targets.linux-aarch64]
archive = "https://github.com/wearethelegion/legion/releases/download/v1.2.6/legion-linux-arm64.tar.gz"
cmd = "./legion"
args = ["acp"]

[agent_servers.legion.targets.linux-x86_64]
archive = "https://github.com/wearethelegion/legion/releases/download/v1.2.6/legion-linux-x64.tar.gz"
cmd = "./legion"
args = ["acp"]

[agent_servers.legion.targets.windows-x86_64]
archive = "https://github.com/wearethelegion/legion/releases/download/v1.2.6/legion-windows-x64.zip"
cmd = "./legion.exe"
args = ["acp"]
