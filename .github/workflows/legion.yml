name: legion

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  legion:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /legion') ||
      startsWith(github.event.comment.body, '/legion')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run legion
        uses: wearethelegion/legion/github@latest
        env:
          LEGION_API_KEY: ${{ secrets.LEGION_API_KEY }}
          LEGION_PERMISSION: '{"bash": "deny"}'
        with:
          model: legion/claude-opus-4-5
